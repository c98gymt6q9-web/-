<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>417 | Прыгающие цифры</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #8B0000 0%, #FF0000 50%, #CC0000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Impact', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Контейнер для цифр */
        .number-container {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 30px;
            perspective: 500px;
            flex-wrap: wrap;
            padding: 20px;
            margin-bottom: 40px;
        }

        /* Стиль для каждой цифры */
        .digit {
            font-size: 250px;
            font-weight: 900;
            color: #FFFFFF;
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.5),
                0 0 40px rgba(255, 255, 255, 0.3),
                0 10px 30px rgba(0, 0, 0, 0.3);
            display: inline-block;
            cursor: default;
            transition: transform 0.2s ease;
            animation: bounce 1.2s ease-in-out infinite;
            transform-origin: center bottom;
        }

        /* Разные задержки для каждой цифры */
        .digit-4 {
            animation-delay: 0s;
        }

        .digit-1 {
            animation-delay: 0.2s;
        }

        .digit-7 {
            animation-delay: 0.4s;
        }

        /* Ключевые кадры анимации прыжка */
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0) scale(1);
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 10px 30px rgba(0,0,0,0.3);
            }
            30% {
                transform: translateY(-80px) scale(1.1);
                text-shadow: 0 0 40px rgba(255, 255, 255, 0.9), 0 20px 40px rgba(0,0,0,0.4);
            }
            60% {
                transform: translateY(-40px) scale(1.05);
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.7), 0 15px 35px rgba(0,0,0,0.35);
            }
            85% {
                transform: translateY(0) scale(1);
            }
        }

        /* Дополнительный эффект при наведении на цифру */
        .digit:hover {
            animation: none;
            transform: scale(1.3) translateY(-20px);
            text-shadow: 0 0 50px rgba(255, 255, 255, 1);
            transition: all 0.3s ease;
        }

        /* Стиль для текстового блока */
        .message {
            position: absolute;
            bottom: 15%;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .main-text {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .telegram-link {
            font-size: 20px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .telegram-link a {
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .telegram-link a:hover {
            text-decoration: underline;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .telegram-link:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.6);
        }

        /* Подпись внизу — убрали или оставим минимальной */
        .subtitle {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* Адаптация для мобильных устройств */
        @media (max-width: 768px) {
            .digit {
                font-size: 120px;
            }
            .number-container {
                gap: 15px;
                margin-bottom: 20px;
            }
            @keyframes bounce {
                30% {
                    transform: translateY(-40px) scale(1.1);
                }
            }
            .main-text {
                font-size: 20px;
            }
            .telegram-link {
                font-size: 16px;
                padding: 6px 18px;
            }
            .message {
                bottom: 20%;
            }
        }

        /* Эффект появления при загрузке */
        .digit {
            opacity: 0;
            animation: bounce 1.2s ease-in-out infinite, fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .digit-4 { animation-delay: 0s, 0s; }
        .digit-1 { animation-delay: 0.2s, 0.1s; }
        .digit-7 { animation-delay: 0.4s, 0.2s; }
    </style>
</head>
<body>
    <div class="number-container">
        <span class="digit digit-4">4</span>
        <span class="digit digit-1">1</span>
        <span class="digit digit-7">7</span>
    </div>

    <div class="message">
        <div class="main-text">🌟 Скоро здесь будет новый сайт!</div>
        <div class="telegram-link">
            <a href="https://t.me/ваш_телеграм" target="_blank" rel="noopener noreferrer">
                📢 А пока — почитайте Telegram
            </a>
        </div>
    </div>

    <div class="subtitle"></div>
</body>
</html>
